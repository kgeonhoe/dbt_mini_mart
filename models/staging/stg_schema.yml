version: 2

models:
  - name: stg_orders
    description: >
      **Raw → Stg 변환 근거**

      Raw에는 주문 헤더(olist_orders)와 주문 아이템(olist_order_items)이 별도 테이블로 존재합니다.
      이 프로젝트의 분석 grain은 '주문 아이템(order line)'이므로, staging 단계에서
      두 테이블을 inner join하여 하나의 주문 아이템 행을 만듭니다.

      변환 내용:
      1) olist_orders + olist_order_items를 order_id로 조인 → 1행 = 1 주문 아이템
      2) order_id + order_item_id를 concat하여 대리키(order_line_id) 생성 (generate_order_line_id 매크로)
      3) timestamp → date 캐스팅(order_date), 금액 컬럼 double 캐스팅
      4) gross_item_amount = item_price + freight_value 파생 컬럼 추가
      5) raw의 shipping_limit_date, order_approved_at 등 분석 불필요 컬럼은 제외

      Grain: 주문 아이템 1행 (order_id + order_item_id).
    columns:
      - name: order_line_id
        description: "주문 라인 PK (order_id || '-' || order_item_id)"
        tests:
          - unique
          - not_null
      - name: order_id
        description: 주문 ID (olist_orders FK)
        tests:
          - not_null
      - name: customer_id
        description: 고객 ID (olist_customers FK)
        tests:
          - not_null
      - name: seller_id
        description: 판매자 ID
      - name: order_purchase_ts
        description: 주문 생성 타임스탬프
      - name: order_date
        description: 주문 날짜 (date 캐스팅)
        tests:
          - not_null
      - name: order_status
        description: "주문 상태 (delivered, shipped 등)"
      - name: product_id
        description: 상품 ID
      - name: order_item_id
        description: 주문 내 아이템 순번
      - name: item_price
        description: 아이템 단가
      - name: freight_value
        description: 아이템별 배송비
      - name: gross_item_amount
        description: "아이템 총액 (item_price + freight_value)"

  - name: stg_customers
    description: >
      **Raw → Stg 변환 근거**

      Raw olist_customers에는 customer_id(주문별 발급)와 customer_unique_id(실제 고객) 2개 키가 있습니다.
      Olist 시스템은 같은 사람이 주문할 때마다 새 customer_id를 부여하지만,
      customer_unique_id는 동일합니다. 이 구조를 살려 dim_customer 차원의 기초로 사용합니다.

      변환 내용:
      1) customer_zip_code_prefix를 varchar로 캐스팅 (숫자로 잘못 인식되는 것 방지)
      2) 컬럼명은 원천 그대로 유지 — 추가 리네이밍 불필요
      3) 원천 1행 = 1 customer_id이므로 grain 변경 없음

      Grain: customer_id 1행.
    columns:
      - name: customer_id
        description: 고객 PK (주문별 고유)
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: 고객 고유 식별자 (재구매 추적용)
        tests:
          - not_null
      - name: customer_zip_code_prefix
        description: 고객 우편번호 앞자리
      - name: customer_city
        description: 고객 도시
      - name: customer_state
        description: 고객 주(州) 코드

  - name: stg_products
    description: >
      **Raw → Stg 변환 근거**

      Raw에는 olist_products(상품 속성)과 product_category_name_translation(포르투갈어→영문 변환)이
      별도 테이블로 존재합니다. 분석 시 영문 카테고리명이 필수이므로 staging에서 left join합니다.

      변환 내용:
      1) olist_products + product_category_name_translation을 category_name으로 left join
         (매핑이 없는 카테고리도 상품을 잃지 않도록 left join)
      2) product_name_lenght → product_name_length 등 원천의 오타(lenght) 교정
      3) 무게·크기 컬럼을 integer로 캐스팅

      Grain: product_id 1행.
    columns:
      - name: product_id
        description: 상품 PK
        tests:
          - unique
          - not_null
      - name: product_category_name
        description: 포르투갈어 카테고리명
      - name: product_category_name_english
        description: 영문 카테고리명 (번역 테이블 left join)
      - name: product_name_length
        description: 상품명 글자 수
      - name: product_description_length
        description: 상품 설명 글자 수
      - name: product_photos_qty
        description: 상품 사진 수
      - name: product_weight_g
        description: 상품 무게 (g)
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: product_length_cm
        description: 상품 길이 (cm)
      - name: product_height_cm
        description: 상품 높이 (cm)
      - name: product_width_cm
        description: 상품 너비 (cm)

  - name: stg_sellers
    description: >
      **Raw → Stg 변환 근거**

      Raw olist_sellers는 판매자별 위치(도시, 주, 우편번호) 정보를 가진 마스터 테이블입니다.
      dim_seller 차원의 기초로 사용하며, 별도 조인 없이 타입만 정리합니다.

      변환 내용:
      1) seller_zip_code_prefix를 varchar로 캐스팅
      2) 원천 grain(seller_id 1행) 유지, 불필요 컬럼 없음

      Grain: seller_id 1행.
    columns:
      - name: seller_id
        description: 판매자 PK
        tests:
          - unique
          - not_null
      - name: seller_zip_code_prefix
        description: 판매자 우편번호 앞자리
      - name: seller_city
        description: 판매자 도시
      - name: seller_state
        description: 판매자 주(州) 코드

  - name: stg_payments
    description: >
      **Raw → Stg 변환 근거**

      Raw olist_order_payments는 한 주문에 여러 결제수단(카드+볼레토 등)이 가능한 구조입니다.
      intermediate에서 주결제수단을 선정하고, 주문별 결제 합계를 계산하는 기초로 사용됩니다.
      또한 dim_payment_type 차원은 이 모델에서 distinct payment_type을 추출하여 생성합니다.

      변환 내용:
      1) payment_sequential, payment_installments를 integer, payment_value를 double로 캐스팅
      2) 원천 grain(order_id + payment_sequential) 유지
      3) accepted_values 테스트로 결제수단 코드 유효성 보장

      Grain: order_id + payment_sequential.
    columns:
      - name: order_id
        description: 주문 ID (olist_orders FK)
        tests:
          - not_null
      - name: payment_sequential
        description: 결제 순번
      - name: payment_type
        description: "결제 수단 (credit_card, boleto, voucher, debit_card)"
        tests:
          - not_null
          - accepted_values:
              values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']
      - name: payment_installments
        description: 할부 개월 수
      - name: payment_value
        description: 결제 금액
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

  - name: stg_reviews
    description: >
      **Raw → Stg 변환 근거**

      Raw olist_order_reviews에는 review_comment_title, review_comment_message 등
      텍스트 컬럼이 있으나, 이 프로젝트에서는 정량 분석(평균 리뷰 점수)만 활용합니다.
      intermediate에서 주문별 avg(review_score)로 집계되어 fct_orders에 포함됩니다.

      변환 내용:
      1) review_score를 integer, review_creation_date를 date, review_answer_timestamp를 timestamp로 캐스팅
      2) 분석에 불필요한 코멘트 텍스트 컬럼 제외
      3) accepted_range(1~5)로 점수 범위 보장

      Grain: review_id.
    columns:
      - name: review_id
        description: 리뷰 PK
        tests:
          - not_null
      - name: order_id
        description: 주문 ID (olist_orders FK)
        tests:
          - not_null
      - name: review_score
        description: "리뷰 점수 (1~5)"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 5
              inclusive: true
      - name: review_creation_date
        description: 리뷰 작성 일자
      - name: review_answer_ts
        description: 리뷰 응답(게시) 타임스탬프
